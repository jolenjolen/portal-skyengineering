{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Message - SKY Engineering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
</head>
<body class="bg-light">
    <nav class="navbar bg-white border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'home' %}">
                <img src="{% static 'media/logo.png' %}" alt="SKY Logo" height="40" />
            </a>
            <button
              class="navbar-toggler d-lg-none"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#sidebarMenu"
                 >
              <span class="navbar-toggler-icon"></span>
             </button>
            <div class="d-flex align-items-center gap-3">
                <span class="fw-semibold text-primary">Engineering Portal</span>
                <form action="{% url 'logout' %}" method="post" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <aside id="sidebarMenu" class="collapse d-lg-block col-lg-2 col-12 bg-white border-end p-4">
                <h5 class="mb-4">Menu</h5>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item"><a href="{% url 'home' %}" class="nav-link">Dashboard</a></li>
                    <li class="nav-item"><a href="{% url 'team_list' %}" class="nav-link">Teams</a></li>
                    <li class="nav-item"><a href="{% url 'organisation:department_list' %}" class="nav-link">Departments</a></li>
                    <li class="nav-item"><a href="{% url 'organisation:overview' %}" class="nav-link">Organization</a></li>
                    <li class="nav-item"><a href="{% url 'inbox' %}" class="nav-link active fw-bold text-danger">Messages</a></li>
                    <li class="nav-item"><a href="{% url 'schedule' %}" class="nav-link">Schedule</a></li>
                    <li class="nav-item"><a href="{% url 'reports_dashboard' %}" class="nav-link">Reports</a></li>
                    <li class="nav-item"><a href="{% url 'profile' %}" class="nav-link">Profile</a></li>
                    {% if is_admin_user %}
                    <li class="nav-item"><a href="{% url 'admin_dashboard' %}" class="nav-link">Admin</a></li>
                    {% endif %}
                </ul>
            </aside>

            <main class="col-md-10 col-12 p-5">
                <h1 class="mb-4">New Message</h1>

                <section class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-semibold">To</label>
                                <select name="recipient" class="form-select" required>
                                    <option value="">Select a recipient...</option>
                                    {% for user in users %}
                                    <option value="{{ user.id }}">{{ user.uname }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Subject</label>
                                <input type="text" name="subject" class="form-control" placeholder="Enter subject" required />
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Message</label>
                                <textarea name="body" class="form-control" rows="8" placeholder="Write your message here..." required></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" name="action" value="send" class="btn btn-danger">Send</button>
                                <button type="submit" name="action" value="draft" class="btn btn-outline-secondary">Save as Draft</button>
                                <a href="{% url 'inbox' %}" class="btn btn-outline-danger">Cancel</a>
                            </div>
                        </form>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>
</html>

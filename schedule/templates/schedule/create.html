{% extends 'schedule/base.html' %}

{% block title %}New Meeting - SKY Engineering{% endblock %}

{% block content %}
  <h1 class="mb-3">New Meeting</h1>
  <p class="text-muted">Fill in the details below to schedule a new meeting.</p>

  <div class="card shadow-sm border-0 mt-4">
    <div class="card-body">
      <form method="post" action="{% url 'schedule_create' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Title</label>
          <input type="text" name="title" class="form-control" placeholder="Meeting title" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Date</label>
          <input type="date" name="date" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Time</label>
          <input type="time" name="time" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Meeting Link</label>
          <input type="url" name="meeting_link" class="form-control" placeholder="Enter your meeting link..." />
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-gradient">Save Meeting</button>
          <a href="{% url 'schedule' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}

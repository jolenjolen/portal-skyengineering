{% extends 'schedule/base.html' %}

{% block title %}Edit Meeting - SKY Engineering{% endblock %}

{% block content %}
  <h1 class="mb-3">Edit Meeting</h1>
  <p class="text-muted">Update the details for this meeting.</p>

  <div class="card shadow-sm border-0 mt-4">
    <div class="card-body">
      <form method="post" action="{% url 'schedule_edit' meeting.pk %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Title</label>
          <input type="text" name="title" class="form-control" value="{{ meeting.title }}" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Date</label>
          <input type="date" name="date" class="form-control" value="{{ meeting.date }}" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Time</label>
          <input type="time" name="time" class="form-control" value="{{ meeting.time }}" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Meeting Link</label>
          <input type="url" name="meeting_link" class="form-control" value="{{ meeting.meeting_link }}" placeholder="Enter your meeting link..." />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Notes / Message</label>
          <input type="text" name="message" class="form-control" value="{{ meeting.message }}" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Team</label>
          {% if is_admin_user %}
            <select name="team" class="form-select">
              <option value="">— No team —</option>
              {% for team in teams %}
                <option value="{{ team.pk }}" {% if team == meeting.team %}selected{% endif %}>{{ team.name }}</option>
              {% endfor %}
            </select>
          {% else %}
            <input type="text" class="form-control" value="{{ meeting.team.name|default:'—' }}" disabled />
          {% endif %}
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-gradient">Save Changes</button>
          <a href="{% url 'schedule' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}

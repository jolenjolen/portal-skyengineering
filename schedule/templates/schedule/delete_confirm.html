{% extends 'schedule/base.html' %}

{% block title %}Delete Meeting - SKY Engineering{% endblock %}

{% block content %}
  <h1 class="mb-3">Delete Meeting</h1>

  <div class="card shadow-sm border-0 mt-4">
    <div class="card-body">
      <p>Are you sure you want to delete <strong>{{ meeting.title }}</strong> scheduled for {{ meeting.date }} at {{ meeting.time }}?</p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger">Yes, Delete</button>
          <a href="{% url 'schedule' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}

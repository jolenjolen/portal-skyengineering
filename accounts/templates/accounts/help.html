{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY Engineering - Help</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="{% static 'accounts/css/styles.css' %}">
</head>
<body >
    <nav class="navbar navbar-expand-sm navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <img src="{% static 'media/logo.png' %}" alt="Logo" height="40">
            </a>
            <button class="navbar-toggler hamburger-menu" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="icon-wrapper">
                    <span id="iconMenu" class="material-symbols-rounded icon active">menu</span>
                    <span id="iconClose" class="material-symbols-rounded icon">close</span>
                </span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav ms-auto text-center">
                    <hr>
                    <li class="nav-item mx-2">
                    <a class="nav-link roboto-nav-link active-link" href="{% url 'help' %}">Help</a>
                    </li>
                    <hr>
                    <li class="nav-item mx-2">
                    <a class="nav-link roboto-nav-link" href="{% url 'contact' %}">Contact&nbsp;Support</a>
                    </li>
                    <hr>
                    <li class="nav-item mx-2">
                    <a class="nav-link roboto-nav-link" href="{% url 'login' %}">Sign&nbsp;In</a>
                    </li>   
                    <br> 
                </ul>
            </div>
        </div>
    </nav>

    <div class="main2 m-2 p-2 rounded-4 border d-flex justify-content-center align-items-center">
        <main class="shadow border bg-white w-100 rounded-4 m-2 p-4 text-center">
            <h1 class="text-center">Contact Support</h1>
            <p class="text-center">For assistance, please email us at <a href="mailto:support@skyengineering.com">support@skyengineering.com</a></p>
        </main>
    </div>

    <footer class="bg-white text-muted mt-2 border-top">
        <br>
        <div class="container">
            <div class="row">
                <div class="col-md-6 text-center text-md-start">
                    <p>&copy; 2024 SKY Engineering. All rights reserved.</p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <a href="{% url 'pp' %}" class="text-decoration-none me-3 roboto-nav-link">Privacy&nbsp;Policy</a>
                    <a href="{% url 'tos' %}" class="text-decoration-none me-3 roboto-nav-link">Terms&nbsp;of&nbsp;Service</a>
                </div>
            </div>
    </footer>


    <script>
        const navbar = document.getElementById('collapsibleNavbar');
        const menuIcon = document.getElementById('iconMenu');
        const closeIcon = document.getElementById('iconClose');

        navbar.addEventListener('show.bs.collapse', () => {
            menuIcon.classList.remove('active');
            closeIcon.classList.add('active');
        });

        navbar.addEventListener('hide.bs.collapse', () => {
            closeIcon.classList.remove('active');
            menuIcon.classList.add('active');
        });
    </script>
</body>
</html>

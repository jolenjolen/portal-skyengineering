{% extends "base.html" %}

{% block title %}Sign In — Sky Engineering{% endblock %}

{% block extra_css %}
<style>
  /* ─── Login page layout ─── */
  .login-page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    position: relative;
    overflow: hidden;
    min-height: calc(100vh - var(--nav-height) - 49px);
  }

  /* Decorative ink-splash blobs (matches the pink watercolour in the mockup) */
  .login-page::before,
  .login-page::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }
  .login-page::before {
    width: 340px;
    height: 260px;
    background: radial-gradient(ellipse, rgba(233,30,140,0.18) 0%, transparent 70%);
    bottom: 60px;
    left: 50%;
    transform: translateX(-60%);
  }
  .login-page::after {
    width: 200px;
    height: 200px;
    background: radial-gradient(ellipse, rgba(233,30,140,0.10) 0%, transparent 70%);
    bottom: 30px;
    left: 50%;
    transform: translateX(-10%);
  }

  /* ─── Card ─── */
  .login-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 360px;
    background: var(--sky-white);
    border-radius: var(--card-radius);
    box-shadow: var(--shadow-card);
    padding: 36px 32px 28px;
    animation: cardIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ─── Brand block inside card ─── */
  .login-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    justify-content: center;
  }

  .login-brand .sky-logo-pill {
    font-size: 22px;
    padding: 5px 14px;
  }

  .login-brand__divider {
    width: 1px;
    height: 36px;
    background: var(--sky-grey-light);
  }

  .login-brand__label {
    font-size: 11px;
    font-weight: 700;
    color: var(--sky-grey);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    line-height: 1.3;
  }

  .login-brand__label strong {
    display: block;
    color: var(--sky-blue);
    font-size: 13px;
    letter-spacing: 0.02em;
    text-transform: none;
  }

  /* ─── Form ─── */
  .login-form { display: flex; flex-direction: column; gap: 0; }

  .login-form .form-group { margin-bottom: 12px; }

  /* Forgot password link */
  .login-forgot {
    display: block;
    font-size: 12px;
    color: var(--sky-blue);
    margin-bottom: 16px;
    text-align: left;
    text-decoration: none;
  }
  .login-forgot:hover { text-decoration: underline; }

  /* Login button */
  .login-form .sky-btn--primary {
    width: 100%;
    padding: 11px;
    font-size: 15px;
    border-radius: 24px;
    letter-spacing: 0.01em;
  }

  /* Register link row */
  .login-register {
    margin-top: 16px;
    font-size: 12.5px;
    color: var(--sky-grey);
    text-align: center;
  }
  .login-register a {
    color: var(--sky-pink);
    font-weight: 600;
  }
  .login-register a:hover { text-decoration: underline; }

  /* Error message */
  .login-error {
    font-size: 13px;
    color: #dc2626;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: var(--input-radius);
    padding: 9px 12px;
    margin-top: 12px;
    text-align: center;
  }
</style>
{% endblock %}

{% block content %}
<section class="login-page">
  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
      <span class="sky-logo-pill">sky</span>
      <div class="login-brand__divider"></div>
      <div class="login-brand__label">
        ENGINEERING
        <strong>PORTAL</strong>
      </div>
    </div>

    <!-- Login form -->
    <form class="login-form" method="post" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <input
          class="sky-input"
          type="email"
          name="email"
          id="id_email"
          placeholder="Email"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <input
          class="sky-input"
          type="password"
          name="password"
          id="id_password"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
      </div>

      <a href="{% url 'password_reset' %}" class="login-forgot">Forgot Password?</a>

      <button class="sky-btn sky-btn--primary" type="submit">Login</button>
    </form>

    {% if error %}
      <p class="login-error">{{ error }}</p>
    {% endif %}

    <p class="login-register">
      Don't Have an account? <a href="{% url 'register' %}">Register Here</a>
    </p>

  </div>
</section>
{% endblock %}

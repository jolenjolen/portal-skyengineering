{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <title>Admin Panel</title>
  </head>
  <body class="bg-light">
    <!--Top navigation bar-->
    <nav class="navbar bg-white border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img src="{% static 'media/logo.png' %}" alt="SKY Logo" height="40" />
        </a>

        <div class="d-flex align-items-center gap-3">
          <span class="fw-semibold text-primary">Engineering Portal</span>

          <a
            href="{% url 'admin_dashboard' %}"
            class="btn btn-outline-secondary btn-sm"
          >
            Back
          </a>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <h1>Manage Users</h1>
      <table class="table table-striped mt-4">
        <thead>
          <tr>
            <th>Name</th>
            <th>Username</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for user in users %}
          <tr>
            <td>{{ user.fname }} {{ user.sname }}</td>
            <td>{{ user.uname }}</td>
            <td>{{ user.role }}</td>
            <td>{% if user.active %} Active {% else %} Inactive {% endif %}</td>
            <td>
              <form
                action="{% url 'reset_user_password' user.id %}"
                method="post"
              >
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-warning">
                  Reset password
                </button>
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
